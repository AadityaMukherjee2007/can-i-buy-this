[build]
  base = ""
  command = "cp -r backend netlify/functions/backend && rm -rf netlify/functions/backend/__pycache__ netlify/functions/backend/.pytest_cache && cd frontend && npm run build && cd .."
  publish = "frontend/out/"
  environment = { NEXT_PUBLIC_API_URL = "" }
# PLAID_CLIENT_ID, PLAID_SECRET, PLAID_ENV set in Netlify Dashboard env vars

# API routes — handled by the Python serverless function (must be first)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback — serve index.html for all frontend routes
[[redirects]]
  from = "/**"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
