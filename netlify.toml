[build]
  base = "frontend/"
  command = "npm run build"
  publish = "out/"

# SPA fallback — serve index.html for all routes (Next.js static export)
[[redirects]]
  from = "/**"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
